services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: crn-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_strong_Pass123"
    ports:
      - "1433:1433"
    volumes:
      - crn-sqldata:/var/opt/mssql

volumes:
  crn-sqldata:
