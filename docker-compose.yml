# Brings up the whole stack: SQL Server + the API.
# Usage:  docker compose up --build      then open http://localhost:5078/swagger
services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: crn-products-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_strong_Pass123"
    ports:
      - "1433:1433"          # exposed for local debugging; the API reaches it via the service name "db"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      # API waits until this passes (see depends_on below) so it never starts before SQL is ready.
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"Your_strong_Pass123\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crn-products-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"   # Swagger UI on for the demo
      # Override the connection string: "db" is the SQL service's hostname on the compose network.
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=CrnProducts;User Id=sa;Password=Your_strong_Pass123;TrustServerCertificate=True;"
    ports:
      - "5078:8080"          # host 5078 -> container 8080

volumes:
  mssql-data:
